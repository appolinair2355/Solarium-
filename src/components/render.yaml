services:
  - type: web
    name: baccarat-pro
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /
    autoDeploy: false
