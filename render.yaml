services:
  - type: web
    name: baccarat-pro
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
