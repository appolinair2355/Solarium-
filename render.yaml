services:
  - type: web
    name: baccarat-pro
    env: node
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: baccarat-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: baccarat-db
    plan: free
